<!DOCTYPE html>
<html lang="fr">
<head>

    <title>SGE - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">

                    </tr>
                </thead>
                <tbody id="listeEtudiants">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
