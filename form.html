<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Étudiant</title>
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
</head>
<body>
    <div class="form-card">
        <h2>Nouvel Étudiant</h2>
        <form action="http://precieux-gi1.rf.gd/ajouter_information.php" method="POST">
            <div class="input-group">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" placeholder="Ex: FANOU" required>
            </div>

            <div class="input-group">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Ex: Precieux" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="exemple@gmail.com" required>
            </div>

            <div class="input-group">
                <label for="telephone">Téléphone</label>
                <input type="text" id="telephone" name="telephone" placeholder="0156789756" required>
            </div>

            <div class="input-group">
                <label for="filiere">Filière</label>
                <input type="text" id="filiere" name="filiere" placeholder="Ex: Génie Informatique" required>
            </div>

            <div class="btns">
                <button type="button" onclick="window.location.href='index.html'" class="btn-cancel">Annuler</button>
                <button type="submit" class="btn-save">Enregistrer</button>
            </div>
        </form>
    </div>
</body>
</html>
